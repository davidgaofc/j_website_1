<body>
  <h1>'Till Next Time</h1>
  <p id="demo"></p>
  <button id="emoji-btn" style="font-size:1.5rem; margin-top:30px;">Click If You Miss Me</button>
  <button id="move-btn" style="font-size:1.5rem; margin-top:30px; position:absolute; left:50vw; top:80vh;">Catch Me!</button>
  <div id="emoji-container"></div>

  <script>
    // Countdown timer
    var countDownDate = new Date("June 4, 2026 05:00:00").getTime();
    var x = setInterval(function() {
      var now = new Date().getTime();
      var distance = countDownDate - now;
      var days = Math.floor(distance / (1000 * 60 * 60 * 24));
      var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((distance % (1000 * 60)) / 1000);
      document.getElementById("demo").innerHTML = days + "d " + hours + "h "
      + minutes + "m " + seconds + "s ";
      if (distance < 0) {
        clearInterval(x);
        document.getElementById("demo").innerHTML = "EXPIRED";
      }
    }, 1000);

    // Emoji button logic
    const emojis = ["💜", "😘", "🫦", "💚", "🫂", "🫶"];
    document.getElementById('emoji-btn').onclick = function() {
      const emoji = emojis[Math.floor(Math.random() * emojis.length)];
      const emojiElem = document.createElement('span');
      emojiElem.textContent = emoji;
      emojiElem.style.position = 'absolute';
      emojiElem.style.fontSize = '2.5rem';
      // Random position within the emoji-container
      const container = document.getElementById('emoji-container');
      const maxX = container.offsetWidth - 40;
      const maxY = container.offsetHeight - 40;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      emojiElem.style.left = x + 'px';
      emojiElem.style.top = y + 'px';
      container.appendChild(emojiElem);
    };

    // Moving button logic
    const moveBtn = document.getElementById('move-btn');
    const messages = [
      "Nice try! 😜",
      "Missed me!",
      "Try again!",
      "Too slow!",
      "Almost!",
      "Keep chasing!"
    ];
    moveBtn.onclick = function() {
      // Get viewport size
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      // Random position (avoid edges)
      const btnWidth = moveBtn.offsetWidth;
      const btnHeight = moveBtn.offsetHeight;
      const randLeft = Math.random() * (vw - btnWidth);
      const randTop = Math.random() * (vh - btnHeight);
      // Place button
      moveBtn.style.left = randLeft + "px";
      moveBtn.style.top = randTop + "px";
      // Show message at previous location
      const msg = messages[Math.floor(Math.random() * messages.length)];
      const msgElem = document.createElement('div');
      msgElem.textContent = msg;
      msgElem.style.position = 'absolute';
      msgElem.style.left = randLeft + "px";
      msgElem.style.top = randTop + btnHeight + 5 + "px";
      msgElem.style.background = "#fffbe7";
      msgElem.style.border = "1px solid #ffe066";
      msgElem.style.padding = "8px 16px";
      msgElem.style.borderRadius = "8px";
      msgElem.style.fontSize = "1.2rem";
      msgElem.style.zIndex = 1000;
      document.body.appendChild(msgElem);
      setTimeout(() => {
        msgElem.remove();
      }, 1200);
    };
  </script>
</body>
